[variables]
    NIXPACKS_NODE_VERSION = '22.12.0'
    NODE_VERSION = '22.12.0'
    PNPM_FLAGS = '--force'

[phases.setup]
    nixPkgs = ['nodejs_22', 'pnpm-9_x']

[phases.install]
    cmds = ['pnpm install --frozen-lockfile --force']

[phases.build]
    cmds = ['pnpm run build']

[start]
    cmd = 'exec caddy run --config /assets/Caddyfile --adapter caddyfile 2>&1'